version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: nx_postgres
    restart: always
    environment:
      POSTGRES_USER: nxuser
      POSTGRES_PASSWORD: nxpass
      POSTGRES_DB: nxdb
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis/redis-stack-server:latest
    container_name: nx_redis
    restart: always
    ports:
      - '6379:6379'

volumes:
  postgres_data:
